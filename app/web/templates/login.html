{% extends "sqladmin/login.html" %}

{% block head_css %}
<link rel="stylesheet" href="/static/custom_admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .login-container {
        background: white;
        border-radius: 20px;
        padding: 50px 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        max-width: 450px;
        width: 100%;
        animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-logo {
        text-align: center;
        margin-bottom: 40px;
    }

    .logo-icon {
        font-size: 4rem;
        margin-bottom: 15px;
    }

    .logo-text {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(90deg, #FF6B00 0%, #FF8533 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 5px;
    }

    .logo-subtext {
        color: #6b7280;
        font-size: 1rem;
        font-weight: 500;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-label {
        display: block;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 10px;
        font-size: 0.95rem;
    }

    .form-control {
        width: 100%;
        padding: 15px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #f9f9f9;
    }

    .form-control:focus {
        outline: none;
        border-color: #FF6B00;
        background: white;
        box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
    }

    .btn-primary {
        width: 100%;
        padding: 15px;
        background: linear-gradient(90deg, #FF6B00 0%, #FF8533 100%);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        margin-top: 10px;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(255, 107, 0, 0.4);
    }

    .btn-primary:active {
        transform: translateY(0);
    }

    .alert {
        padding: 15px 20px;
        border-radius: 12px;
        margin-bottom: 25px;
        font-weight: 500;
    }

    .alert-danger {
        background: linear-gradient(90deg, #fee 0%, #fdd 100%);
        color: #c00;
        border: 2px solid #fcc;
    }

    .divider {
        text-align: center;
        margin: 30px 0;
        color: #9ca3af;
        font-size: 0.9rem;
    }

    .footer-text {
        text-align: center;
        margin-top: 30px;
        color: #9ca3af;
        font-size: 0.85rem;
    }

    @media (max-width: 480px) {
        .login-container {
            padding: 40px 30px;
        }

        .logo-text {
            font-size: 1.5rem;
        }

        .logo-icon {
            font-size: 3rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-logo">
        <div class="logo-icon">🏗</div>
        <div class="logo-text">AVTOBAN STROY</div>
        <div class="logo-subtext">Admin Panel</div>
    </div>

    {% if error %}
    <div class="alert alert-danger">
        <strong>⚠️ Xato!</strong> {{ error }}
    </div>
    {% endif %}

    <form method="post">
        <div class="form-group">
            <label class="form-label" for="username">
                <i class="fas fa-user"></i> Foydalanuvchi nomi
            </label>
            <input 
                type="text" 
                class="form-control" 
                id="username" 
                name="username" 
                placeholder="admin" 
                required 
                autofocus
            >
        </div>

        <div class="form-group">
            <label class="form-label" for="password">
                <i class="fas fa-lock"></i> Parol
            </label>
            <input 
                type="password" 
                class="form-control" 
                id="password" 
                name="password" 
                placeholder="••••••••" 
                required
            >
        </div>

        <button type="submit" class="btn-primary">
            <i class="fas fa-sign-in-alt"></i> Kirish
        </button>
    </form>

    <div class="footer-text">
        © 2026 Avtoban Stroy. Barcha huquqlar himoyalangan.
    </div>
</div>
{% endblock %}
