<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avtoban Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #000);
  padding: 16px;
}
.card { 
  background: var(--tg-theme-secondary-bg-color, #f0f0f0);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat {
  background: var(--tg-theme-secondary-bg-color, #f0f0f0);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-value {
  font-size: 32px;
  font-weight: bold;
  margin: 8px 0;
}
.stat-label {
  font-size: 12px;
  color: var(--tg-theme-hint-color, #999);
}
h2 {
  font-size: 18px;
  margin-bottom: 12px;
}
.order-item {
  background: var(--tg-theme-secondary-bg-color, #f0f0f0);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}
.order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.order-number {
  font-weight: bold;
}
.status-badge {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 12px;
  color: white;
  font-weight: 600;
}
.status-new { background: #ef4444; }
.status-confirmed { background: #22c55e; }
.status-in_work { background: #f59e0b; }
.status-done { background: #6b7280; }
.order-details {
  font-size: 13px;
  color: var(--tg-theme-hint-color, #999);
  line-height: 1.6;
}
.loading {
  text-align: center;
  padding: 40px;
  color: var(--tg-theme-hint-color, #999);
}
</style>
</head>
<body>

<div id="app">
  <div class="loading" id="loading">Yuklanmoqda...</div>
  
  <div id="content" style="display:none;">
    <h2>📊 Statistika</h2>
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-value" id="totalOrders">0</div>
        <div class="stat-label">Jami zakazlar</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="newOrders">0</div>
        <div class="stat-label">Yangi</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="inWork">0</div>
        <div class="stat-label">Ishda</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalUsers">0</div>
        <div class="stat-label">Foydalanuvchilar</div>
      </div>
    </div>

    <h2>📋 So'nggi zakazlar</h2>
    <div id="orders"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

async function loadData() {
  try {
    // Load stats
    const statsRes = await fetch('/tma-api/stats');
    const stats = await statsRes.json();
    document.getElementById('totalOrders').textContent = stats.total_orders;
    document.getElementById('newOrders').textContent = stats.new_orders;
    document.getElementById('inWork').textContent = stats.in_work;
    document.getElementById('totalUsers').textContent = stats.total_users;

    // Load recent orders
    const ordersRes = await fetch('/tma-api/orders?limit=10');
    const orders = await ordersRes.json();
    const ordersDiv = document.getElementById('orders');
    ordersDiv.innerHTML = orders.map(o => `
      <div class="order-item">
        <div class="order-header">
          <span class="order-number">${o.number}</span>
          <span class="status-badge status-${o.status}">${o.status}</span>
        </div>
        <div class="order-details">
          👤 ${o.client}<br>
          📍 ${o.address}<br>
          📐 ${o.area || '—'} m² · 💰 ${formatNum(o.total)} so'm
        </div>
      </div>
    `).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').textContent = 'Xatolik: ' + e.message;
  }
}

function formatNum(n) {
  if (!n) return '0';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}

loadData();
</script>

</body>
</html>
