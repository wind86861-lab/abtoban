<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avtoban Admin — Kirish</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 50%, #0d1f2d 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo .icon {
      font-size: 48px; display: block; margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px;
    }
    .logo p {
      font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 4px;
    }
    .error-box {
      background: rgba(229,57,53,0.15);
      border: 1px solid rgba(229,57,53,0.4);
      border-radius: 10px;
      padding: 12px 14px;
      color: #ff8a80;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; color: rgba(255,255,255,0.35); pointer-events: none;
    }
    input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: #2196f3;
      background: rgba(33,150,243,0.08);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1976d2, #2196f3);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.3px;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 20px rgba(33,150,243,0.35);
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:active { transform: scale(.98); }
    .hint {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      margin-top: 24px;
      line-height: 1.6;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 28px 0 24px;
    }
    .roles {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    .role-chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="icon">🏗️</span>
      <h1>Avtoban Admin Panel</h1>
      <p>Kirish uchun ma'lumotlarni kiriting</p>
    </div>

    {% if error %}
    <div class="error-box">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/tma-login">
      <div class="form-group">
        <label>Foydalanuvchi nomi / Telefon</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="username" placeholder="admin yoki +998901234567" autocomplete="username" required />
        </div>
      </div>
      <div class="form-group">
        <label>Parol</label>
        <div class="input-wrap">
          <span class="icon">🔐</span>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
      </div>
      <button type="submit" class="btn-login">🔓 Kirish</button>
    </form>

    <hr class="divider">
    <div class="roles">
      <span class="role-chip">Admin</span>
      <span class="role-chip">Super Admin</span>
    </div>
    <p class="hint">Super Admin — parolni Telegram bot orqali o'rnating<br>⚙️ Parolni O'zgartirish tugmasidan foydalaning</p>
  </div>
</body>
</html>
