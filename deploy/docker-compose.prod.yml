version: "3.9"

services:
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m app.main
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - abtoban_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery:
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - abtoban_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat:
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      - redis
    networks:
      - abtoban_net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abtoban_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abtoban_net

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - abtoban_net
    restart: "no"

volumes:
  postgres_data:
  redis_data:

networks:
  abtoban_net:
    driver: bridge
